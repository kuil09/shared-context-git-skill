interface:
  display_name: "Shared Context Git"
  short_description: "Run a Git-backed shared memory workflow"
  default_prompt: "Use $shared-context-git-skill to bootstrap or operate a Git-backed shared context repository for a multi-agent project."

policy:
  allow_implicit_invocation: true

parameters:
  default_actor: "claude"
  branch_prefix: "context/claude"
  auto_validate: true

workflow_hints:
  - "Run scripts/sync_context.sh before reading or editing any shared document."
  - "Always read CONTEXT.md before making changes."
  - "Use scripts/prepare_branch.sh --actor claude --slug <topic> to create update branches."
  - "Run scripts/validate_context.sh after edits and before committing."
  - "Commit only when changes are meaningful. Use structured commit messages with Trigger/Applied/Unresolved fields."

skill_paths:
  skill_definition: "SKILL.md"
  scripts: "scripts/"
  templates: "assets/templates/"
  references: "references/"
