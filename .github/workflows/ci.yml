name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on scripts
        run: shellcheck scripts/*.sh

  bats:
    name: BATS Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run BATS suite (TAP output)
        run: |
          ./tests/run_tests.sh --formatter tap | tee test-results.tap
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: Fail if tests failed
        if: env.exit_code != '0'
        run: exit 1

      - name: Upload TAP test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-tap-results
          path: test-results.tap

  validate-context:
    name: Validate Shared Context
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for shared-context file changes
        id: changed
        run: |
          FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}")
          if echo "$FILES" | grep -qE '^(CONTEXT\.md|TIMELINE\.md|HANDOFF\.md|POLICY\.md)$'; then
            echo "has_context_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_context_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run validate_context.sh
        if: steps.changed.outputs.has_context_files == 'true'
        run: ./scripts/validate_context.sh

      - name: Skip validation (no context files changed)
        if: steps.changed.outputs.has_context_files != 'true'
        run: echo "No shared-context files changed — skipping validation"
